name: treadmill-ci
env:
  TERM: xterm # Makes tput work in actions output

# Controls when the action will run. Triggers the workflow on push or pull
# request events but only for the master branch
on:
  # To avoid double-runs, we only run checks on main (or other long-term
  # branches potentially added in the future). To initiate checks to be
  # triggered for a branch, open a (draft) PR.
  push:
    branches: [main]
  # Run CI for PRs on any branch
  pull_request:
  # Run CI for the GitHub merge queue
  merge_group:

# Cancel superseded runs for the same PR. Never cancel merge_group or main runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest

    # If building on main, we have access to the "cachix-push" environment
    # secrets and can push to the cache.
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'cachix-push' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: treadmill-tb
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}

      # On `pull_request`, only build a curated subset of checks to keep PR
      # feedback fast. The full `nix flake check` runs in `merge_group` (which
      # gates merging into main) and on `push` to main, so heavier builds
      # (musl cross-compile of tml-puppet, swx-image, per-binary package
      # derivations, etc.) still get exercised before anything lands.
      - name: nix build (PR fast checks)
        if: github.event_name == 'pull_request'
        run: |
          SYSTEM="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          nix build --print-build-logs \
            ".#checks.${SYSTEM}.clippy" \
            ".#checks.${SYSTEM}.nextest" \
            ".#checks.${SYSTEM}.switchboard-migrations-consistency" \
            ".#checks.${SYSTEM}.treefmt"

      - name: nix flake check (full)
        if: github.event_name != 'pull_request'
        run: nix flake check --print-build-logs

  deploy-switchboard:
    needs: nix-flake-check

    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Grants access to `FLY_API_TOKEN` to this job.
    environment: flyio-deploy-prod

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: treadmill-tb
          # Read-only: we're just building the docker image, but that doesn't
          # need to be pushed and consume space in the cache.
          skipPush: true

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install yq
        run: sudo apt-get update && sudo apt-get install -y yq

      - name: Build switchboard image
        run: |
          nix build .#swx-image --print-build-logs
          # swx-image is a streamLayeredImage; ./result is a script that streams
          # the image tarball on stdout.
          ./result | docker load

      - name: Push image to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth docker
          APP="$(tomlq -r '.app' switchboard/flyio/fly.toml)"
          IMAGE="registry.fly.io/${APP}:${GITHUB_SHA}"
          docker tag treadmill-switchboard:latest "$IMAGE"
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --image "$IMAGE" --config switchboard/flyio/fly.toml
