name: treadmill-images
env:
  TERM: xterm # Makes tput work in actions output

on:
  workflow_dispatch:
    inputs:
      push_to_ghcr:
        description: 'Push the built image layouts to ghcr.io'
        type: boolean
        default: false

# One run at a time per ref; do not cancel an in-flight (long) build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Needed only when push_to_ghcr is set; harmless otherwise.
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: treadmill-tb
          # Read-only: images embed pre-built dependencies (e.g., puppet), but
          # aren't pushed to Cachix. Too large, get uploaded to ghcr instead.
          skipPush: true

      - name: nix build (image layouts)
        run: |
          SYSTEM="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          nix build --print-build-logs \
            ".#packages.${SYSTEM}.image-ubuntu-2204" \
            ".#packages.${SYSTEM}.image-ubuntu-2204-gha-runner" \
            ".#packages.${SYSTEM}.image-raspbian-13" \
            ".#packages.${SYSTEM}.image-raspbian-13-gha-runner"

      # Sanity check, parse the images using the Rust implementation:
      - name: nix build (images-parse drift guard)
        run: |
          SYSTEM="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          nix build --print-build-logs ".#packages.${SYSTEM}.images-parse"

      - name: Upload image layouts
        uses: actions/upload-artifact@v4
        with:
          name: treadmill-images
          path: ./result*
          # Symlinks into /nix/store would otherwise upload as dangling links.
          follow-symlinks: true
          if-no-files-found: error

      # Authenticate to ghcr; writes the credential to ~/.docker/config.json,
      # which skopeo reads by default in the push step below.
      - name: Log in to ghcr.io
        if: ${{ inputs.push_to_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- ghcr push (conditioned on push_to_ghcr input) -----------

      # Pull the exact built store paths back out of the flake (no rebuild,
      # already realised above) and `skopeo copy` each OCI layout to
      # ghcr.io/<owner>/<name>.
      #
      # The custom `shell:` resolves skopeo once and puts it on PATH for the
      # whole script (nix stays available too).
      - name: Push image layouts to ghcr.io
        if: ${{ inputs.push_to_ghcr }}
        shell: nix shell nixpkgs#skopeo --command bash -euo pipefail {0}
        run: |
          SYSTEM="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          OWNER="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REGISTRY="ghcr.io/${OWNER}"

          # push <attr> <repo>: copy the realised OCI layout to :<sha> + :latest.
          push() {
            local attr="$1" repo="$2" path
            path="$(nix build --no-link --print-out-paths ".#packages.${SYSTEM}.${attr}")"
            for tag in "${GITHUB_SHA}" latest; do
              echo "skopeo copy oci:${path} -> docker://${repo}:${tag}"
              skopeo copy --all "oci:${path}" "docker://${repo}:${tag}"
            done
          }

          for name in ubuntu-2204 ubuntu-2204-gha-runner raspbian-13 raspbian-13-gha-runner; do
            push "image-${name}" "${REGISTRY}/${name}"
          done
