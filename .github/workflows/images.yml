name: treadmill-images
env:
  TERM: xterm # Makes tput work in actions output

on:
  workflow_dispatch:
    inputs:
      # Per-family build toggles. A "family" is a base image plus all of its
      # derivatives. Keep this list (and the family -> members map in the
      # "Select image families" step below) in sync with the `imageDefs` table
      # in nix/images.nix.
      build_ubuntu_2204:
        description: 'Build the Ubuntu 22.04 family (base + GitHub Actions runner)'
        type: boolean
        default: true
      build_raspbian_13:
        description: 'Build the Raspberry Pi OS 13 family (base + GitHub Actions runner)'
        type: boolean
        default: true
      push_to_ghcr:
        description: 'Push the built image layouts to ghcr.io'
        type: boolean
        default: false

# One run at a time per ref; do not cancel an in-flight (long) build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Needed only when push_to_ghcr is set; harmless otherwise.
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: treadmill-tb
          # Read-only: images embed pre-built dependencies (e.g., puppet), but
          # aren't pushed to Cachix. Too large, get uploaded to ghcr instead.
          skipPush: true

      # Resolve the per-family booleans into the flat list of member images to
      # build. The family -> members map below mirrors nix/images.nix `imageDefs`
      # (a family is the base image plus its derivatives) and must be kept in
      # sync with it by hand — that is the trade-off of per-family boolean inputs
      # over a nix-eval'd matrix.
      - name: Select image families
        env:
          BUILD_UBUNTU_2204: ${{ inputs.build_ubuntu_2204 }}
          BUILD_RASPBIAN_13: ${{ inputs.build_raspbian_13 }}
        run: |
          members=""
          if [ "$BUILD_UBUNTU_2204" = "true" ]; then
            members="$members ubuntu-2204 ubuntu-2204-gha-runner"
          fi
          if [ "$BUILD_RASPBIAN_13" = "true" ]; then
            members="$members raspbian-13 raspbian-13-gha-runner"
          fi
          members="$(echo "$members" | xargs)" # collapse/trim whitespace
          if [ -z "$members" ]; then
            echo "::error::No image family selected; enable at least one." >&2
            exit 1
          fi
          echo "Selected images: $members"
          echo "IMAGE_MEMBERS=$members" >> "$GITHUB_ENV"

      # Build each selected layout and validate it with the `image-check` drift
      # guard. Building `image-check-<name>` reparses the freshly built layout
      # and also realises `image-<name>` (its dependency), so a separate
      # `--out-link` then materialises the layout for upload at zero extra cost.
      - name: Build and validate image layouts
        run: |
          SYSTEM="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          for name in $IMAGE_MEMBERS; do
            echo "::group::build+check $name"
            nix build --print-build-logs --no-link ".#packages.${SYSTEM}.image-check-${name}"
            nix build --print-build-logs --out-link "result-${name}" ".#packages.${SYSTEM}.image-${name}"
            echo "::endgroup::"
          done

      - name: Upload image layouts
        uses: actions/upload-artifact@v4
        with:
          name: treadmill-images
          # `result-*` are symlinks into /nix/store; upload-artifact@v4
          # dereferences them and uploads the layout contents.
          path: ./result-*
          if-no-files-found: error

      # Authenticate to ghcr; writes the credential to ~/.docker/config.json,
      # which skopeo reads by default in the push step below.
      - name: Log in to ghcr.io
        if: ${{ inputs.push_to_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- ghcr push (conditioned on push_to_ghcr input) -----------

      # Pull the exact built store paths back out of the flake (no rebuild,
      # already realised above) and `skopeo copy` each OCI layout to
      # ghcr.io/<owner>/<name>.
      #
      # The custom `shell:` resolves skopeo once and puts it on PATH for the
      # whole script (nix stays available too).
      - name: Push image layouts to ghcr.io
        if: ${{ inputs.push_to_ghcr }}
        shell: nix shell nixpkgs#skopeo --command bash -euo pipefail {0}
        run: |
          SYSTEM="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          OWNER="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REGISTRY="ghcr.io/${OWNER}"

          # push <attr> <repo>: copy the realised OCI layout to :<sha> + :latest.
          push() {
            local attr="$1" repo="$2" path
            path="$(nix build --no-link --print-out-paths ".#packages.${SYSTEM}.${attr}")"
            for tag in "${GITHUB_SHA}" latest; do
              echo "skopeo copy oci:${path} -> docker://${repo}:${tag}"
              skopeo copy --all "oci:${path}" "docker://${repo}:${tag}"
            done
          }

          for name in $IMAGE_MEMBERS; do
            push "image-${name}" "${REGISTRY}/${name}"
          done
