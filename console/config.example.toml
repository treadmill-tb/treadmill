# Example configuration for the treadmill console.
#
# Every key can also be supplied via environment variables prefixed with
# `TML_CONSOLE_`, nesting with `__`, e.g.:
#   TML_CONSOLE_SERVER__BIND_ADDRESS=0.0.0.0:8080
#   TML_CONSOLE_SWITCHBOARD__BASE_URL=https://switchboard.example

[server]
# Address the console binds its HTTP listener to.
bind_address = "127.0.0.1:8080"
# The console's own externally reachable origin. Point the switchboard's
# `browser_success_redirect` at `<public_base_url>/auth/landing`. An https
# origin makes the session cookie `Secure`.
public_base_url = "http://localhost:8080"

[switchboard]
# Origin of the switchboard API. The `/api/v1` prefix is added automatically.
base_url = "http://localhost:8000"
