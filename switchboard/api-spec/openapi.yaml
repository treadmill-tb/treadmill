openapi: 3.1.0
info:
  title: Treadmill Switchboard API
  version: 0.1.0
paths:
  /jobs:
    get:
      parameters:
      - in: query
        name: cursor
        description: Opaque keyset cursor from a previous response's `next_cursor`.
        schema:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type: string
        style: form
      - in: query
        name: limit
        description: |-
          Maximum number of jobs per page. Omitted or out-of-range values fall
          back to the server's default and bounds.
        schema:
          description: |-
            Maximum number of jobs per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type: integer
          format: uint32
          minimum: 0
        style: form
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            Response body of `GET /jobs`: a page of jobs the caller can read, newest
            first.

            Pagination is **keyset** on `(queued_at, job_id)` descending: when
            `next_cursor` is non-null, pass it back as the `cursor` query parameter to
            fetch the next page; a null `next_cursor` means the last page. There is no
            total count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
      security:
      - token: []
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
      security:
      - token: []
  /jobs/{id}/events:
    get:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: A page of rendered audit events for one entity, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
      security:
      - token: []
  /jobs/{id}/log-token:
    post:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            Connection credentials for tailing/replaying a job's console logs over NATS,
            returned by `POST /jobs/{id}/log-token`.

            The token is a short-lived **bearer** user JWT scoped to *subscribe* to this
            job's log subjects (`subject`); the client connects to `nats_url` with the
            token string alone (no nkey seed). The token only needs to be valid at
            connect time — an established NATS connection is not dropped when the JWT
            expires — so a client re-requests credentials when it next reconnects, after
            roughly `expires_in_secs`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogStreamCredentials'
      security:
      - token: []
  /jobs/{id}:
    get:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The full server-side view of a single job, returned by `GET /jobs/{id}`.

            Covers the job's identity, ownership, lifecycle state, the spec it was
            enqueued with, and — once it has run — its placement and terminal outcome.
            Secret parameters are redacted (see [`JobParameterView`]).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobInfo'
      security:
      - token: []
    delete:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
      security:
      - token: []
  /hosts:
    get:
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HostInfo'
      security:
      - token: []
  /hosts/{id}/events:
    get:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: A page of rendered audit events for one entity, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
      security:
      - token: []
  /hosts/{id}/connect:
    get:
      parameters:
      - in: header
        name: authorization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '101':
          description: websocket upgrade
          headers:
            connection:
              style: simple
              schema:
                const: upgrade
                enum:
                - upgrade
                type: string
                example: upgrade
            upgrade:
              style: simple
              schema:
                const: websocket
                enum:
                - websocket
                type: string
                example: websocket
            sec-websocket-key:
              style: simple
              schema:
                type: string
            sec-websocket-protocol:
              style: simple
              schema:
                type: string
  /users/me:
    get:
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The owner's full view of their own profile: the public subset plus the
            private additions only the account holder may see.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfUserProfile'
      security:
      - token: []
    patch:
      requestBody:
        description: |-
          A patch to the caller's own profile. Omitting a field leaves it unchanged;
          sending an explicit `null` clears it. `username` cannot be cleared, only
          changed.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The owner's full view of their own profile: the public subset plus the
            private additions only the account holder may see.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfUserProfile'
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
      security:
      - token: []
  /users/me/tokens:
    get:
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
      security:
      - token: []
  /users/me/tokens/{token_id}:
    delete:
      parameters:
      - in: path
        name: token_id
        description: The token's unique identifier.
        required: true
        schema:
          description: The token's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
      security:
      - token: []
  /users/{id}:
    get:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The world-readable subset of a user profile: only data deemed safe to expose
