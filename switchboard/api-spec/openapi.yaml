components:
  securitySchemes:
    token:
      type: http
      scheme: bearer
      description: 'A Treadmill user API token, presented as `Authorization: Bearer <token>`.'
  schemas:
    AuditFeedQuery:
      description: Query parameters for an audit feed (`GET /{entity}/{id}/events`).
      type: object
      properties:
        cursor:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type:
          - string
          - 'null'
        limit:
          description: |-
            Maximum number of events per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type:
          - integer
          - 'null'
          format: uint32
          minimum: 0
    AuditFeedResponse:
      description: |-
        A page of rendered audit events for one entity, newest first.

        Paginated by keyset: when `next_cursor` is non-null, pass it back as the
        `cursor` query parameter to fetch the next (older) page; a null `next_cursor`
        means the last page.
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/RenderedAuditRow'
        next_cursor:
          description: Opaque cursor for the next page, or null on the last page.
          type:
          - string
          - 'null'
      required:
      - events
    AuthProvidersResponse:
      description: |-
        Response body for the unauthenticated `/auth/providers` endpoint: which login
        methods a switchboard offers, so a frontend can render the right buttons
        without hardcoding provider knowledge.
      type: object
      properties:
        mock_identities:
          description: |-
            Built-in mock sign-in identities. Non-empty ONLY when the
            development-only mock provider is enabled; each is an unauthenticated,
            canned identity. A frontend MUST surface these as development-only.
          type: array
          items:
            $ref: '#/components/schemas/MockIdentityInfo'
        oauth:
          description: Real OAuth providers (e.g. GitHub) the user can start a login flow with.
          type: array
          items:
            $ref: '#/components/schemas/OAuthProviderInfo'
      required:
      - oauth
      - mock_identities
    AuthToken:
      type: string
    CallbackQuery:
      description: Query parameters the provider appends to the callback redirect.
      type: object
      properties:
        code:
          type: string
        state:
          type: string
      required:
      - code
      - state
    CreateGenerationRequest:
      description: |-
        `POST /image-groups/{id}/generations`: append a new, immutable
        full-replacement generation of a group's membership.
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/GenerationMemberSpec'
      required:
      - members
    CreateImageGroupRequest:
      description: |-
        `POST /image-groups`: create an empty, named image group. The caller becomes
        its owner; membership is added afterwards via per-generation snapshots (see
        [`CreateGenerationRequest`]).
      type: object
      properties:
        label:
          description: Optional human-readable label.
          type:
          - string
          - 'null'
          default: null
        name:
          description: The stable, globally-unique moving-target handle a job references (by id).
          type: string
        public:
          description: |-
            When `true`, every subject implicitly holds `use` on the group (may run
            jobs against it) without an explicit grant. Never confers `manage`.
          type: boolean
          default: false
      required:
      - name
    Digest:
      description: |-
        A content-addressable OCI digest over 32 bytes of SHA-256.

        Formats as the canonical OCI string `sha256:<64 lower-case hex>`.
      type: string
    DigestPath:
      description: The `{digest}` segment of an image route.
      type: object
      properties:
        digest:
          description: The image's OCI manifest digest (`sha256:<hex>`).
          type: string
      required:
      - digest
    EnqueueJobResponse:
      description: 'Response body of `POST /jobs`: the id assigned to the freshly enqueued job.'
      type: object
      properties:
        job_id:
          type: string
          format: uuid
      required:
      - job_id
    GenerationMemberInfo:
      description: |-
        One member of a generation, as returned by the inspect route. A member is
        admissible for a host iff the host's tags are a superset of
        `required_host_tags`.
      type: object
      properties:
        image_id:
          type: string
          format: uuid
        index:
          type: integer
          format: uint32
          minimum: 0
        manifest_digest:
          $ref: '#/components/schemas/Digest'
        required_host_tags:
          type: array
          items:
            type: string
      required:
      - image_id
      - manifest_digest
      - required_host_tags
      - index
    GenerationMemberSpec:
      description: |-
        One member of a new generation; `index` is the member's array position in the
        request, used as the deterministic tie-break among equally-specific members.
      type: object
      properties:
        image_id:
          description: Image to include; must already be registered via `POST /images`.
          type: string
          format: uuid
        required_host_tags:
          description: |-
            Host tags a host must carry (as a superset) for this member to be
            selectable on it.
          type: array
          default: []
          items:
            type: string
      required:
      - image_id
    GenerationPath:
      description: The `{id}/generations/{n}` segments of an image-group generation route.
      type: object
      properties:
        id:
          description: The image group's unique identifier.
          type: string
          format: uuid
        n:
          description: The generation number within the group.
          type: integer
          format: uint32
          minimum: 0
      required:
      - id
      - n
    GrantPath:
      description: The `{id}/grants/{subject_id}/{permission}` segments of a grant route.
      type: object
      properties:
        id:
          description: The image group's unique identifier.
          type: string
          format: uuid
        permission:
          description: The permission being revoked (`use` or `manage`).
          type: string
        subject_id:
          description: The subject (user or group) the grant applies to.
          type: string
          format: uuid
      required:
      - id
      - subject_id
      - permission
    GroupMembership:
      description: |-
        One group the user belongs to, including transitive memberships (e.g. via
        nested groups or a linked GitHub org).
      type: object
      properties:
        group_id:
          type: string
          format: uuid
        name:
          type: string
        source:
          description: How the membership arose (`direct`, `github_org`, ...).
          type: string
        source_ref:
          description: |-
            The external reference backing an auto-sourced membership (e.g. the
            GitHub org id); empty for direct memberships.
          type: string
      required:
      - group_id
      - name
      - source
      - source_ref
    HostInfo:
      description: |-
        A host in the `GET /hosts` listing: its identity, opaque tags, attached
        targets, and liveness.
      type: object
      properties:
        host_id:
          type: string
          format: uuid
        last_seen_at:
          description: |-
            The host's last heartbeat, or null if it has never reported (or its
            supervisor disconnected cleanly).
          type:
          - string
          - 'null'
          format: date-time
        live:
          description: |-
            Whether the host's supervisor has heartbeat recently enough to be
            considered schedulable, computed with the deployment's liveness window.
          type: boolean
        name:
          type: string
        tags:
          description: |-
            Opaque host tags; a job's `host_tag_requirements` match a host whose
            `tags` are a superset.
          type: array
          items:
            type: string
        targets:
          description: The targets (DUTs) wired to this host, in stable order.
          type: array
          items:
            $ref: '#/components/schemas/HostTarget'
      required:
      - host_id
      - name
      - tags
      - live
      - targets
    HostTarget:
      description: One target (DUT) attached to a host, as exposed by `GET /hosts`.
      type: object
      properties:
        name:
          description: Stable per-host label for the DUT (e.g. `"dut0"`).
          type: string
        tags:
          description: Opaque tag set (same convention as host tags).
          type: array
          items:
            type: string
      required:
      - name
      - tags
    IdPath:
      description: A single `{id}` UUID segment.
      type: object
      properties:
        id:
          description: The resource's unique identifier.
          type: string
          format: uuid
      required:
      - id
    ImageGroupGenerationInfo:
      description: One immutable generation (membership snapshot) of an image group.
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        created_by:
          type:
          - string
          - 'null'
          format: uuid
        generation:
          type: integer
          format: uint32
          minimum: 0
        group_id:
          type: string
          format: uuid
        members:
          type: array
          items:
            $ref: '#/components/schemas/GenerationMemberInfo'
      required:
      - group_id
      - generation
      - created_at
      - members
    ImageGroupGrantInfo:
      description: One grant on an image group, as returned by the list-grants route.
      type: object
      properties:
        permission:
          $ref: '#/components/schemas/ImageGroupPermission'
        subject_id:
          type: string
          format: uuid
      required:
      - subject_id
      - permission
    ImageGroupGrantRequest:
      description: '`POST /image-groups/{id}/grants`: grant `permission` on the group to a subject.'
      type: object
      properties:
        permission:
          $ref: '#/components/schemas/ImageGroupPermission'
        subject_id:
          type: string
          format: uuid
      required:
      - subject_id
      - permission
    ImageGroupInfo:
      description: A named, mutable image group, as returned by the catalog list/inspect routes.
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        label:
          type:
          - string
          - 'null'
        latest_generation:
          description: The group's latest generation number, or null if it has none yet.
          type:
          - integer
          - 'null'
          format: uint32
          minimum: 0
        name:
          type: string
        owner_id:
          type:
          - string
          - 'null'
          format: uuid
        public:
          description: When `true`, every subject implicitly holds `use` on the group.
          type: boolean
      required:
      - id
      - name
      - public
      - created_at
    ImageGroupPermission:
      description: A permission on an image group.
      oneOf:
      - description: May run a job referencing the group (and so its member images).
        type: string
        const: use
      - description: May create generations and manage grants (owner holds this implicitly).
        type: string
        const: manage
    ImageInfo:
      description: A registered image, as returned by the catalog list/inspect routes.
      type: object
      properties:
        artifact_type:
          type: string
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        label:
          type:
          - string
          - 'null'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/ImageLocation'
        manifest_digest:
          $ref: '#/components/schemas/Digest'
        owner_id:
          type:
          - string
          - 'null'
          format: uuid
      required:
      - id
      - manifest_digest
      - artifact_type
      - created_at
      - locations
    ImageLocation:
      description: One registry location of a registered image.
      type: object
      properties:
        registry:
          type: string
        repository:
          type: string
        status:
          description: '`external`, `canonical`, or `system`.'
          type: string
      required:
      - registry
      - repository
      - status
    JobImageRef:
      description: |-
        What a job is based off, as seen by `GET /jobs/{id}`: a concrete image, an
        image group (with the frozen generation), or a resume/restart of an earlier
        job. The concrete manifest digest actually dispatched is reported separately
        as `resolved_image_digest`.
      oneOf:
      - description: Based off a concrete catalog image, addressed by its catalog id.
        type: object
        properties:
          image_id:
            type: string
            format: uuid
          type:
            type: string
            const: image
        required:
        - type
        - image_id
      - description: |-
          Based off a registered image *group*, addressed by its id plus the frozen
          generation; the concrete member is chosen at dispatch.
        type: object
        properties:
          generation:
            type: integer
            format: uint32
            minimum: 0
          group_id:
            type: string
            format: uuid
          type:
            type: string
            const: image_group
        required:
        - type
        - group_id
        - generation
      - description: Resumes a previously started job.
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: resume
        required:
        - type
        - job_id
      - description: Restarts a previously started job (inherits its image reference).
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: restart
        required:
        - type
        - job_id
    JobInfo:
      description: |-
        The full server-side view of a single job, returned by `GET /jobs/{id}`.

        Covers the job's identity, ownership, lifecycle state, the spec it was
        enqueued with, and — once it has run — its placement and terminal outcome.
        Secret parameters are redacted (see [`JobParameterView`]).
      type: object
      properties:
        dispatched_on_host_id:
          description: The host the job is (or was) dispatched on; null if unplaced.
          type:
          - string
          - 'null'
          format: uuid
        exit_message:
          description: A human-readable detail accompanying termination, if any.
          type:
          - string
          - 'null'
        host_tag_requirements:
          description: |-
            Host eligibility tags this job requires (superset match against a host's
            tags).
          type: array
          items:
            type: string
        image:
          description: What the job is based off.
          allOf:
          - $ref: '#/components/schemas/JobImageRef'
        initializing_stage:
          description: The sub-stage while `state` is `initializing`; null otherwise.
          anyOf:
          - $ref: '#/components/schemas/JobInitializingStage'
          - type: 'null'
        job_id:
          type: string
          format: uuid
        owner_id:
          description: |-
            Owning subject (user or group); null if the owner was deleted
            (orphaned).
          type:
          - string
          - 'null'
          format: uuid
        parameters:
          description: Job parameters, keyed by name; secret values are redacted.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/JobParameterView'
        queued_at:
          description: When the job was enqueued.
          type: string
          format: date-time
        resolved_image_digest:
          description: |-
            The concrete manifest digest actually dispatched, recorded at dispatch;
            null until then.
          anyOf:
          - $ref: '#/components/schemas/Digest'
          - type: 'null'
        restart_policy:
          $ref: '#/components/schemas/RestartPolicyState'
        ssh_endpoints:
          description: SSH endpoints the running job is reachable on; null until reported.
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/SshEndpoint'
        ssh_keys:
          type: array
          items:
            type: string
        started_at:
          description: When the job was dispatched onto a host; null if not yet started.
          type:
          - string
          - 'null'
          format: date-time
        state:
          description: Where the job is in its lifecycle.
          allOf:
          - $ref: '#/components/schemas/JobState'
        target_requirements:
          description: |-
            Target (DUT) eligibility: one tag set per requested target, in submission
            order.
          type: array
          items:
            type: array
            items:
              type: string
        task_exit_status:
          description: |-
            The user workload's success/failure outcome, orthogonal to
            `termination_reason`; null if never reported.
          anyOf:
          - $ref: '#/components/schemas/TaskExitStatus'
          - type: 'null'
        terminated_at:
          description: When the job was finalized; null until then.
          type:
          - string
          - 'null'
          format: date-time
        termination_reason:
          description: Why the job terminated; null until finalized.
          anyOf:
          - $ref: '#/components/schemas/TerminationReason'
          - type: 'null'
        timeout_secs:
          description: How long the job may run before it is killed, in seconds.
          type: integer
          format: int64
      required:
      - job_id
      - state
      - image
      - ssh_keys
      - restart_policy
      - host_tag_requirements
      - target_requirements
      - parameters
      - timeout_secs
      - queued_at
    JobInitSpec:
      oneOf:
      - description: Resume a previously started job.
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: resume
        required:
        - type
        - job_id
      - description: Restart a previously started job (inherits its image reference).
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: restart
        required:
        - type
        - job_id
      - description: |-
          Base this job off a concrete image registered in the switchboard
          catalog, addressed by its catalog id (`POST /images`). At dispatch the
          switchboard resolves the image to its registry locations for the
          supervisor.
        type: object
        properties:
          image_id:
            type: string
            format: uuid
          type:
            type: string
            const: image
        required:
        - type
        - image_id
      - description: |-
          Base this job off a registered image *group*, addressed by its stable id.
          `generation` pins a specific membership snapshot; when omitted, the
          group's latest generation is resolved and frozen onto the job at enqueue.
          After a host is chosen, the switchboard matcher selects the generation's
          member whose required host tags the chosen host satisfies and dispatches
          that concrete member.
        type: object
        properties:
          generation:
            type:
            - integer
            - 'null'
            format: uint32
            default: null
            minimum: 0
          group_id:
            type: string
            format: uuid
          type:
            type: string
            const: image_group
        required:
        - type
        - group_id
    JobInitializingStage:
      description: |-
        The fine-grained stage of a job that is still coming up, exposed as
        `initializing_stage` on [`JobInfo`] while its `state` is `initializing` (and
        null in every other state). A job advances through these stages in order as
        the host fetches its image, allocates resources, provisions the environment,
        and boots, before it becomes `ready`.
      oneOf:
      - description: Generic starting stage, reported before any more specific stage applies.
        type: string
        const: starting
      - description: Fetching the job's image.
        type: string
        const: fetching_image
      - description: Acquiring resources (such as the root filesystem) for the environment.
        type: string
        const: allocating
      - description: Applying the requested customizations to the base system.
        type: string
        const: provisioning
      - description: The host is booting; the job becomes `ready` once it is up.
        type: string
        const: booting
    JobListResponse:
      description: |-
        Response body of `GET /jobs`: a page of jobs the caller can read, newest
        first.

        Pagination is **keyset** on `(queued_at, job_id)` descending: when
        `next_cursor` is non-null, pass it back as the `cursor` query parameter to
        fetch the next page; a null `next_cursor` means the last page. There is no
        total count.
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobSummary'
        next_cursor:
          description: Opaque cursor for the next page, or null on the last page.
          type:
          - string
          - 'null'
      required:
      - jobs
    JobParameter:
      description: |-
        One parameter supplied with a job at enqueue (`POST /jobs`), passed through
        to the puppet daemon running the workload.

        Flag a parameter `secret` to have its value withheld wherever the job is
        later read back (it surfaces as a redacted [`JobParameterView`]); non-secret
        parameters are returned verbatim.
      type: object
      properties:
        secret:
          description: |-
            Whether to treat the value as secret (withheld when the job is read
            back).
          type: boolean
        value:
          description: The parameter's value.
          type: string
      required:
      - value
      - secret
    JobParameterView:
      description: |-
        One job parameter as exposed by `GET /jobs/{id}`. A parameter flagged
        `secret` is **redacted**: its `value` is null and only the key and the
        `secret` flag are visible. Non-secret parameters carry their plaintext
        `value`.
      type: object
      properties:
        secret:
          description: Whether this parameter was submitted as secret.
          type: boolean
        value:
          description: The plaintext value, or null when the parameter is secret (withheld).
          type:
          - string
          - 'null'
      required:
      - secret
    JobRequest:
      type: object
      properties:
        host_tag_requirements:
          description: |-
            Host eligibility: the set of tags the chosen host must carry (as a
            superset) for this job to be assigned to it. Tags are opaque strings
            (`key=value` pairs or bare flags, by convention only), matched by
            containment against the host's tags.
          type: array
          default: []
          items:
            type: string
        init_spec:
          description: What kind of job this is.
          allOf:
          - $ref: '#/components/schemas/JobInitSpec'
        override_timeout:
          type:
          - string
          - 'null'
        owner:
          description: |-
            The subject (user or group) to own the enqueued job. Must be the caller
            itself or a group the caller is a member of; absent, ownership defaults
            to the caller. Ownership decides who can later read, stop, and manage the
            job.
          type:
          - string
          - 'null'
          format: uuid
          default: null
        parameters:
          description: |-
            A hash map of parameters provided to this job execution. These
            parameters are provided to the puppet daemon.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/JobParameter'
        restart_policy:
          $ref: '#/components/schemas/RestartPolicy'
        ssh_keys:
          description: |-
            The set of initial SSH keys to deploy onto the image.

            The image's configuration of the Treadmill puppet daemon determines
            how and whether these keys will be loaded.
          type: array
          items:
            type: string
        target_requirements:
          description: |-
            Target (DUT) eligibility: an ordered array of requested targets, each a
            set of tags an attached DUT must carry (as a superset). The scheduler
            assigns each entry to a distinct attached target (DUT) on the chosen
            host. Empty requests no DUTs. Target tags do not affect image selection.
          type: array
          default: []
          items:
            type: array
            items:
              type: string
      required:
      - init_spec
      - ssh_keys
      - restart_policy
      - parameters
    JobState:
      description: |-
        Where a job is in its execution lifecycle: queued → assigned → initializing
        → ready → terminating → finalized.
      oneOf:
      - description: Enqueued, awaiting placement onto a host by the scheduler.
        type: string
        const: queued
      - description: Placed on a host but not yet reported as executing.
        type: string
        const: assigned
      - description: The host is bringing the job up (see `initializing_stage`).
        type: string
        const: initializing
      - description: The job is running and ready.
        type: string
        const: ready
      - description: The job is shutting down.
        type: string
        const: terminating
      - description: 'Terminal: the job has ended (see `termination_reason`).'
        type: string
        const: finalized
    JobSummary:
      description: |-
        A compact per-job row for the `GET /jobs` listing — identity, ownership,
        lifecycle state, and the key timestamps/outcome, without the heavier
        per-job detail (parameters, target requirements, ssh keys) that
        [`JobInfo`] carries. Fetch the full view with `GET /jobs/{id}`.
      type: object
      properties:
        dispatched_on_host_id:
          description: The host the job is (or was) dispatched on; null if unplaced.
          type:
          - string
          - 'null'
          format: uuid
        image:
          $ref: '#/components/schemas/JobImageRef'
        job_id:
          type: string
          format: uuid
        owner_id:
          description: Owning subject (user or group); null if orphaned.
          type:
          - string
          - 'null'
          format: uuid
        queued_at:
          type: string
          format: date-time
        started_at:
          type:
          - string
          - 'null'
          format: date-time
        state:
          $ref: '#/components/schemas/JobState'
        task_exit_status:
          anyOf:
          - $ref: '#/components/schemas/TaskExitStatus'
          - type: 'null'
        terminated_at:
          type:
          - string
          - 'null'
          format: date-time
        termination_reason:
          anyOf:
          - $ref: '#/components/schemas/TerminationReason'
          - type: 'null'
      required:
      - job_id
      - state
      - image
      - queued_at
    LinkedGitHub:
      description: A linked GitHub identity, reduced to the fields safe to expose publicly.
      type: object
      properties:
        login:
          description: The user's current GitHub login/handle.
          type: string
        profile_url:
          description: Canonical URL of the GitHub profile (`https://github.com/<login>`).
          type: string
      required:
      - login
      - profile_url
    ListQuery:
      description: Query parameters for `GET /jobs`.
      type: object
      properties:
        cursor:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type:
          - string
          - 'null'
        limit:
          description: |-
            Maximum number of jobs per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type:
          - integer
          - 'null'
          format: uint32
          minimum: 0
    LoginCompleteRequest:
      description: |-
        Request body for `POST /auth/login/complete`: finish a staged login. Sent as
        JSON or form-encoded data.
      type: object
      properties:
        staged_id:
          description: The staged login, from [`LoginStagedResponse::staged_id`].
          type: string
          format: uuid
        staged_secret:
          description: Its one-time secret, from [`LoginStagedResponse::staged_secret`].
          type: string
        tos_version:
          description: |-
            The ToS version the user was shown and accepted (only mandatory if
            `required` contained `"tos"`). Must match the version currently in
            force, so a concurrent ToS bump cannot record consent to text the user
            never saw.
          type:
          - integer
          - 'null'
          format: int32
      required:
      - staged_id
      - staged_secret
    LoginResponse:
      description: |-
        Response Body that [`login_handler`] emits.

        Indicates that the user successfully authenticated, and was issued `token`, which inherits the
        user's credentials, and will expire at `expires_at`.
      type: object
      properties:
        expires_at:
          type: string
          format: date-time
        token:
          $ref: '#/components/schemas/AuthToken'
      required:
      - token
      - expires_at
    LoginStagedResponse:
      description: |-
        Response body for a staged login: the callback has verified the identity
        (e.g., OAuth token exchanged, admission passed) and staged the login
        server-side. Every interactive login is staged; the caller finishes it by
        `POST`ing the `(staged_id, staged_secret)` pair to `/auth/login/complete`,
        which is the sole point that mints the session token.

        `required` lists what the completion must additionally provide. An empty
        list means the login is ready to claim: complete immediately, no extra
        fields needed. The following is a non-exhaustive list of `required` steps:

        - `tos`: the user must (re)accept the latest version of the ToS, echoing
          the `tos_version` actually shown.

        Returned as `200` by the OAuth callback (a browser flow that declared a
        `return_to` is instead `302`-redirected there with the pair in the query),
        and as `409 Conflict` by `/auth/login/complete` when the presented
        completion is still missing a required step (with a fresh pair — the
        presented one is consumed).

        `staged_secret` must be kept secret and treated equivalently to an auth
        token, as it can mint an auth token.
      type: object
      properties:
        required:
          description: |-
            What the completion step must provide; empty means ready to claim
            (recognized steps are documented on the type).
          type: array
          items:
            type: string
        staged_id:
          description: Identifies the staged login to `/auth/login/complete`.
          type: string
          format: uuid
        staged_secret:
          description: |-
            Single-use secret that `/auth/login/complete` exchanges for an auth
            token.
          type: string
        tos_version:
          description: |-
            The ToS version the user is being asked to accept (if `required`
            contains `"tos"`), echoed back on completion so consent is recorded
            against the text actually shown.
          type:
          - integer
          - 'null'
          format: int32
      required:
      - required
      - staged_id
      - staged_secret
    MockIdentityInfo:
      description: A built-in mock identity advertised by `/auth/providers` (development only).
      type: object
      properties:
        key:
          description: Identity selector passed back to the mock login endpoint.
          type: string
        label:
          description: Human-readable label, e.g. `"alice (admin)"`.
          type: string
        login_path:
          description: |-
            Path, relative to the switchboard origin, that starts this identity's
            login, e.g. `"/api/v1/auth/mock/login?identity=alice"`.
          type: string
      required:
      - key
      - label
      - login_path
    NatsLogStreamCredentials:
      description: |-
        Connection credentials for tailing/replaying a job's console logs over NATS,
        returned by `POST /jobs/{id}/nats-log-token`.

        The token is a short-lived **bearer** user JWT scoped to this job only: it
        may *subscribe* to the job's log subjects (`subject`) and its own inboxes
        (`inbox_prefix`), and *publish* to the slice of the JetStream API needed to
        run an ordered consumer against the job's stream (`stream`) — enough to
        replay stored history and then follow live. The client connects with the
        token string alone (no nkey seed) to whichever endpoint suits its transport:
        `websocket_url` for browsers, `nats_url` for native TCP clients. The same
        token authorizes either. The token only needs to be valid at connect time —
        an established NATS connection is not dropped when the JWT expires — so a
        client re-requests credentials when it next reconnects, after roughly
        `expires_in_secs`.
      type: object
      properties:
        expires_in_secs:
          description: |-
            Seconds until the token's `exp`; re-request credentials after this
            elapses (only needed to open a *new* connection).
          type: integer
          format: uint64
          minimum: 0
        inbox_prefix:
          description: |-
            Inbox prefix the client **must** configure on its connection
            (`_INBOX.logs-<job-id>`): the token's subscribe permission covers only
            inboxes under this prefix, not the account-default `_INBOX.>`.
          type: string
        jetstream_domain:
          description: |-
            The server's JetStream domain, when it is configured with one; the
            client must address the JetStream API through it. Usually absent.
          type:
          - string
          - 'null'
        nats_url:
          description: |-
            Plain-TCP NATS client URL (e.g. `nats://nats.example:4222`), for native
            clients that speak the binary protocol. Nullable: a deployment may
            choose to expose only the WebSocket endpoint publicly, in which case
            only `websocket_url` is returned. Browsers cannot use this — they must
            use `websocket_url`.
          type:
          - string
          - 'null'
        stream:
          description: 'JetStream stream holding this job''s logs: `logs-<job-id>`.'
          type: string
        subject:
          description: |-
            Subject wildcard covering all of this job's log channels:
            `logs.<job-id>.>`.
          type: string
        token:
          description: Bearer user JWT authorizing the scope described above.
          type: string
        websocket_url:
          description: |-
            NATS **WebSocket** URL (e.g. `wss://nats.example:443`), for browser
            clients, which cannot speak the plain TCP protocol. Absent when the
            deployment does not expose a WebSocket listener; a browser client cannot
            stream logs against such a deployment.
          type:
          - string
          - 'null'
      required:
      - subject
      - stream
      - inbox_prefix
      - token
      - expires_in_secs
    OAuthProviderInfo:
      description: A real OAuth provider advertised by `/auth/providers`.
      type: object
      properties:
        display_name:
          description: Human-readable label for a button, e.g. `"GitHub"`.
          type: string
        login_path:
          description: |-
            Path, relative to the switchboard origin, that starts the login flow,
            e.g. `"/api/v1/auth/github/login"`.
          type: string
        name:
          description: Stable provider key, e.g. `"github"`.
          type: string
      required:
      - name
      - display_name
      - login_path
    ProviderPath:
      description: The `{provider}` segment of an OAuth login route.
      type: object
      properties:
        provider:
          description: The login provider's name (e.g. `github`).
          type: string
      required:
      - provider
    PublicUserProfile:
      description: |-
        The world-readable subset of a user profile: only data deemed safe to expose
        to any authenticated caller.
      type: object
      properties:
        avatar_url:
          type:
          - string
          - 'null'
        full_name:
          type:
          - string
          - 'null'
        github:
          description: The linked GitHub account, if any.
          anyOf:
          - $ref: '#/components/schemas/LinkedGitHub'
          - type: 'null'
        user_id:
          type: string
          format: uuid
        username:
          type: string
      required:
      - user_id
      - username
    RegisterImageRequest:
      description: |-
        `POST /images`: register a concrete image by digest. The switchboard pulls
        the manifest from `registry/repository@manifest_digest`, validates it is a
        Treadmill image, and records the image plus its first location.
      type: object
      properties:
        label:
          description: Optional human-readable label.
          type:
          - string
          - 'null'
          default: null
        manifest_digest:
          description: The OCI manifest digest identifying the image.
          allOf:
          - $ref: '#/components/schemas/Digest'
        registry:
          description: Registry authority (`host:port`) the manifest can be pulled from.
          type: string
        repository:
          description: Repository path within the registry.
          type: string
      required:
      - registry
      - repository
      - manifest_digest
    RenderedAuditRow:
      description: |-
        One audit event, already rendered to a human-readable `message` for the
        requesting viewer (the switchboard resolves the per-event template and
        applies the viewer's visibility before sending it).
      type: object
      properties:
        actor_id:
          type: string
          format: uuid
        correlation_id:
          type:
          - string
          - 'null'
          format: uuid
        created_at:
          type: string
          format: date-time
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
        message:
          type: string
      required:
      - event_id
      - event_type
      - created_at
      - actor_id
      - message
    RestartPolicy:
      description: |-
        How many times a job may be **automatically restarted** after it is dropped
        by its host, supplied with the job at enqueue (`POST /jobs`).

        Each automatic restart enqueues a successor that inherits one fewer; the
        count a running job still has left is reported back as [`RestartPolicyState`]
        on [`JobInfo`]. A `max_restarts` of `0` disables automatic restarts.
      type: object
      properties:
        max_restarts:
          description: Maximum number of automatic restarts to grant this job.
          type: integer
          format: uint32
          minimum: 0
      required:
      - max_restarts
    RestartPolicyState:
      description: |-
        The automatic-restart budget a job still has left, exposed as
        `restart_policy` on [`JobInfo`].

        A job enqueued with a [`RestartPolicy`] starts at its `max_restarts`; each
        automatic restart spends one, so this reports how many restarts the job (or
        the successor currently standing in for it) still has remaining.
      type: object
      properties:
        remaining_restarts:
          description: How many automatic restarts this job still has remaining.
          type: integer
          format: uint32
          minimum: 0
      required:
      - remaining_restarts
    SelfUserProfile:
      description: |-
        The owner's full view of their own profile: the public subset plus the
        private additions only the account holder may see.
      type: object
      properties:
        avatar_url:
          type:
          - string
          - 'null'
        emails:
          description: All verified email addresses on file for the account.
          type: array
          items:
            type: string
        full_name:
          type:
          - string
          - 'null'
        github:
          description: The linked GitHub account, if any.
          anyOf:
          - $ref: '#/components/schemas/LinkedGitHub'
          - type: 'null'
        groups:
          description: Every group the user belongs to, including transitive memberships.
          type: array
          items:
            $ref: '#/components/schemas/GroupMembership'
        locked:
          description: Whether the account is locked (cannot log in or use existing sessions).
          type: boolean
        user_id:
          type: string
          format: uuid
        username:
          type: string
      required:
      - user_id
      - username
      - emails
      - groups
      - locked
    SessionInfo:
      description: |-
        One of the caller's active or historical sessions/API tokens. Never carries
        the secret token itself — only its metadata and provenance.
      type: object
      properties:
        comment:
          description: An optional human-supplied label for the token.
          type:
          - string
          - 'null'
        created_at:
          type: string
          format: date-time
        created_ip:
          description: The client IP the token was minted from, if recorded.
          type:
          - string
          - 'null'
        current:
          description: True for the token used to authenticate the current request.
          type: boolean
        expires_at:
          type: string
          format: date-time
        revoked:
          description: Set if the token has been revoked.
          anyOf:
          - $ref: '#/components/schemas/TokenRevocation'
          - type: 'null'
        token_id:
          type: string
          format: uuid
        user_agent:
          description: The user agent that requested the token, if recorded.
          type:
          - string
          - 'null'
      required:
      - token_id
      - created_at
      - expires_at
      - current
    SetImageGroupPublicRequest:
      description: |-
        `PUT /image-groups/{id}/public`: declare a group public (or private again).
        Requires `manage`.
      type: object
      properties:
        public:
          type: boolean
      required:
      - public
    SshEndpoint:
      description: An SSH endpoint a running job can be reached on.
      type: object
      properties:
        ssh_host:
          type: string
        ssh_port:
          type: integer
          format: uint16
          maximum: 65535
          minimum: 0
      required:
      - ssh_host
      - ssh_port
    TaskExitStatus:
      description: |-
        The user workload's success/failure outcome, exposed as `task_exit_status`
        on [`JobInfo`]/[`JobSummary`].

        It is orthogonal to *why* the job terminated (see [`TerminationReason`]): the
        outcome reflects the workload's own result, reported by the host while the
        job runs and revisable until it ends. `pending` means the workload was still
        running when last reported; a null `task_exit_status` means no outcome was
        ever reported.
      oneOf:
      - description: The workload is running; its result is not yet determined.
        type: string
        const: pending
      - description: The workload completed successfully.
        type: string
        const: success
      - description: The workload failed.
        type: string
        const: failure
    TerminationReason:
      description: |-
        Why a job terminated.

        This records *why* a job stopped and is orthogonal to the `task_exit_status`
        (the success/failure of the user's workload) and to any `exit_message`.
      oneOf:
      - description: The job's workload terminated (e.g., QEMU VM shutdown).
        type: string
        const: workload_exited
      - description: |-
          The job requested its own termination (e.g., by requesting termination
          through the puppet).
        type: string
        const: workload_self_terminated
      - description: Externally terminated by a user.
        type: string
        const: user_terminated
      - description: Timed out while still queued.
        type: string
        const: queue_timeout
      - description: Timed out while dispatched/executing.
        type: string
        const: execution_timeout
      - description: The job's image was bad or could not be fetched (user fault).
        type: string
        const: image_error
      - description: No host matched the job's tag configuration.
        type: string
        const: host_match_error
      - description: The host failed to start the job.
        type: string
        const: host_start_failure
      - description: The host's supervisor dropped the job (lost on reconnect).
        type: string
        const: host_dropped_job
      - description: The host was unreachable (its supervisor disconnected).
        type: string
        const: host_unreachable
      - description: Resuming a previously started job failed.
        type: string
        const: resume_failed
      - description: An unexpected internal failure.
        type: string
        const: internal_error
    TokenIdPath:
      description: The `{token_id}` segment of a token route.
      type: object
      properties:
        token_id:
          description: The token's unique identifier.
          type: string
          format: uuid
      required:
      - token_id
    TokenRevocation:
      description: When and why a token was revoked.
      type: object
      properties:
        reason:
          type: string
        revoked_at:
          type: string
          format: date-time
      required:
      - revoked_at
      - reason
    TosInfoResponse:
      description: |-
        Response body for `GET /auth/tos`: the Terms of Service text a frontend
        renders on the login-completion page, plus the version it corresponds to.
      type: object
      properties:
        text:
          description: The Terms of Service text to display.
          type: string
        version:
          description: The version this text corresponds to (the server's current ToS version).
          type: integer
          format: int32
      required:
      - version
      - text
    UpdateProfileRequest:
      description: |-
        A patch to the caller's own profile. Omitting a field leaves it unchanged;
        sending an explicit `null` clears it. `username` cannot be cleared, only
        changed.
      type: object
      properties:
        avatar_url:
          type:
          - string
          - 'null'
        full_name:
          type:
          - string
          - 'null'
        username:
          type:
          - string
          - 'null'
    WhoAmIResponse:
      description: 'Response body for `/auth/whoami`: the identity of the authenticated subject.'
      type: object
      properties:
        full_name:
          type:
          - string
          - 'null'
        user_id:
          type: string
          format: uuid
        username:
          type: string
      required:
      - user_id
      - username
tags:
- name: Authentication
  description: Interactive OAuth login, the login-completion step, and token introspection.
- name: Jobs
  description: Enqueue, inspect, and terminate jobs.
- name: Hosts
  description: Inspect hosts and their attached targets.
- name: Images
  description: Register and inspect catalog images.
- name: Image groups
  description: Manage image groups, their generations, and grants.
- name: Users
  description: Profiles, sessions, and audit feeds.
