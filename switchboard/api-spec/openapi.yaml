  /image-groups/{id}/generations:
    post:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      requestBody:
        description: |-
          `POST /image-groups/{id}/generations`: append a new, immutable
          full-replacement generation of a group's membership.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGenerationRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
      security:
      - token: []
  /image-groups/{id}/generations/{n}:
    get:
      parameters:
      - in: path
        name: id
        description: The image group's unique identifier.
        required: true
        schema:
          description: The image group's unique identifier.
          type: string
          format: uuid
        style: simple
      - in: path
        name: n
        description: The generation number within the group.
        required: true
        schema:
          description: The generation number within the group.
          type: integer
          format: uint32
          minimum: 0
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: One immutable generation (membership snapshot) of an image group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGroupGenerationInfo'
      security:
      - token: []
  /image-groups/{id}/grants:
    get:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageGroupGrantInfo'
      security:
      - token: []
    post:
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      requestBody:
        description: '`POST /image-groups/{id}/grants`: grant `permission` on the group to a subject.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageGroupGrantRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
