openapi: 3.1.0
info:
  title: Treadmill Switchboard API
  version: 0.1.0
paths:
  /jobs:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
        required: true
      responses:
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
  /jobs/{id}/events:
    get:
      responses:
        '200':
          description: A page of rendered audit events for one entity, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
  /jobs/{id}/log-token:
    post:
      responses:
        '200':
          description: |-
            Connection credentials for tailing/replaying a job's console logs over NATS,
            returned by `POST /jobs/{id}/log-token`.

            The token is a short-lived **bearer** user JWT scoped to *subscribe* to this
            job's log subjects (`subject`); the client connects to `nats_url` with the
            token string alone (no nkey seed). The token only needs to be valid at
            connect time — an established NATS connection is not dropped when the JWT
            expires — so a client re-requests credentials when it next reconnects, after
            roughly `expires_in_secs`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogStreamCredentials'
  /jobs/{id}:
    get:
      responses:
        '200':
          description: |-
            The full server-side view of a single job, returned by `GET /jobs/{id}`.

            Covers the job's identity, ownership, lifecycle state, the spec it was
            enqueued with, and — once it has run — its placement and terminal outcome.
            Secret parameters are redacted (see [`JobParameterView`]).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobInfo'
    delete: {}
  /hosts/{id}/events:
    get:
      responses:
        '200':
          description: A page of rendered audit events for one entity, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
  /hosts/{id}/connect:
    get:
      parameters:
      - in: header
        name: authorization
        required: true
        schema:
          type: string
        style: simple
      responses:
        '101':
          description: websocket upgrade
          headers:
            connection:
              style: simple
              schema:
                const: upgrade
                enum:
                - upgrade
                type: string
                example: upgrade
            upgrade:
              style: simple
              schema:
                const: websocket
                enum:
                - websocket
                type: string
                example: websocket
            sec-websocket-key:
              style: simple
              schema:
                type: string
            sec-websocket-protocol:
              style: simple
              schema:
                type: string
  /users/me:
    get:
      responses:
        '200':
          description: |-
            The owner's full view of their own profile: the public subset plus the
            private additions only the account holder may see.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfUserProfile'
    patch:
      requestBody:
        description: |-
          A patch to the caller's own profile. Each field uses a double `Option` so an
          absent field (leave unchanged) is distinguishable from an explicit `null`
          (clear the value). `username` is non-nullable, so a single `Option` suffices.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
        required: true
      responses:
        '200':
          description: |-
            The owner's full view of their own profile: the public subset plus the
            private additions only the account holder may see.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfUserProfile'
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
  /users/me/tokens:
    get:
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
  /users/me/tokens/{token_id}:
    delete: {}
  /users/{id}:
    get:
      responses:
        '200':
          description: |-
            The world-readable subset of a user profile: only data deemed safe to expose
            to any authenticated caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfile'
  /users/{id}/events:
    get:
      responses:
        '200':
          description: A page of rendered audit events for one entity, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
  /images:
    get:
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageInfo'
    post:
      requestBody:
        description: |-
          `POST /images`: register a concrete image by digest. The switchboard pulls
          the manifest from `registry/repository@manifest_digest`, validates it is a
          Treadmill image, and records an `images` row plus this first location.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterImageRequest'
        required: true
      responses:
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
  /images/{digest}:
    get:
      responses:
        '200':
          description: A registered image, as returned by the catalog list/inspect routes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageInfo'
  /image-groups:
    get:
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageGroupInfo'
    post:
      requestBody:
        description: |-
          `POST /image-groups`: register an image group by its OCI index digest. The
          switchboard pulls the index, validates each member, and records the group
          plus its (image, location, denormalized-member) rows for the matcher.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterImageGroupRequest'
        required: true
      responses:
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
  /image-groups/{digest}:
    get:
      responses:
        '200':
          description: A registered image group, as returned by the catalog list/inspect routes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGroupInfo'
components:
  schemas:
    AuditFeedResponse:
      description: A page of rendered audit events for one entity, newest first.
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/RenderedAuditRow'
      required:
      - events
    Digest:
      description: |-
        A content-addressable OCI digest over 32 bytes of SHA-256.

        Formats as the canonical OCI string `sha256:<64 lower-case hex>`.
      type: string
    GroupMembership:
      description: |-
        One group the user belongs to, including transitive memberships resolved via
        the `principals()` function.
      type: object
      properties:
        group_id:
          type: string
          format: uuid
        name:
          type: string
        source:
          description: |-
            How the membership arose (`direct`, `github_org`, ...), as stored in
            `tml_switchboard.membership_source`.
          type: string
        source_ref:
          description: |-
            The external reference backing an auto-sourced membership (e.g. the
            GitHub org id); empty for direct memberships.
          type: string
      required:
      - group_id
      - name
      - source
      - source_ref
    ImageGroupInfo:
      description: A registered image group, as returned by the catalog list/inspect routes.
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        index_digest:
          $ref: '#/components/schemas/Digest'
        label:
          type:
          - string
          - 'null'
        members:
          type: array
          items:
            $ref: '#/components/schemas/ImageGroupMember'
        owner_id:
          type:
          - string
          - 'null'
          format: uuid
      required:
      - id
      - index_digest
      - created_at
      - members
    ImageGroupMember:
      description: |-
        One selectable member of a registered group. A member is admissible for a
        host iff the host's tags are a superset of `required_host_tags`.
      type: object
      properties:
        manifest_digest:
          $ref: '#/components/schemas/Digest'
        required_host_tags:
          type: array
          items:
            type: string
      required:
      - manifest_digest
      - required_host_tags
    ImageInfo:
      description: A registered image, as returned by the catalog list/inspect routes.
      type: object
      properties:
        artifact_type:
          type: string
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        label:
          type:
          - string
          - 'null'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/ImageLocation'
        manifest_digest:
          $ref: '#/components/schemas/Digest'
        owner_id:
          type:
          - string
          - 'null'
          format: uuid
      required:
      - id
      - manifest_digest
      - artifact_type
      - created_at
      - locations
    ImageLocation:
      description: One registry location of a registered image.
      type: object
      properties:
        registry:
          type: string
        repository:
          type: string
        status:
          description: '`external`, `canonical`, or `system`.'
          type: string
      required:
      - registry
      - repository
      - status
    JobImageRef:
      description: |-
        What a job is based off, as seen by `GET /jobs/{id}`. Collapses the four
        mutually-exclusive DB columns (`image_digest` / `image_group_digest` /
        `resume_job_id` / `restart_job_id`) into a single tagged variant; the
        separately-recorded concrete dispatch digest is reported alongside as
        [`JobInfo::resolved_image_digest`].
      oneOf:
      - description: Based off a concrete catalog image, addressed by its OCI manifest digest.
        type: object
        properties:
          digest:
            $ref: '#/components/schemas/Digest'
          type:
            type: string
            const: image
        required:
        - type
        - digest
      - description: |-
          Based off a registered image *group*, addressed by its index digest; the
          concrete member is chosen at dispatch.
        type: object
        properties:
          digest:
            $ref: '#/components/schemas/Digest'
          type:
            type: string
            const: image_group
        required:
        - type
        - digest
      - description: Resumes a previously started job.
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: resume
        required:
        - type
        - job_id
      - description: Restarts a previously started job (inherits its image reference).
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: restart
        required:
        - type
        - job_id
    JobInfo:
      description: |-
        The full server-side view of a single job, returned by `GET /jobs/{id}`.

        Covers the job's identity, ownership, lifecycle state, the spec it was
        enqueued with, and — once it has run — its placement and terminal outcome.
        Secret parameters are redacted (see [`JobParameterView`]).
      type: object
      properties:
        dispatched_on_host_id:
          description: The host the job is (or was) dispatched on; `None` if unplaced.
          type:
          - string
          - 'null'
          format: uuid
        exit_message:
          description: A human-readable detail accompanying termination, if any.
          type:
          - string
          - 'null'
        host_tag_requirements:
          description: |-
            Host eligibility tags this job requires (superset match against a host's
            tags).
          type: array
          items:
            type: string
        image:
          description: What the job is based off.
          allOf:
          - $ref: '#/components/schemas/JobImageRef'
        initializing_stage:
          description: |-
            The sub-stage while `state` is [`JobState::Initializing`]; `None`
            otherwise.
          anyOf:
          - $ref: '#/components/schemas/JobInitializingStage'
          - type: 'null'
        job_id:
          type: string
          format: uuid
        last_updated_at:
          description: When the job row was last updated.
          type: string
          format: date-time
        owner_id:
          description: |-
            Owning subject (user or group); `None` if the owner was deleted
            (orphaned).
          type:
          - string
          - 'null'
          format: uuid
        parameters:
          description: Job parameters, keyed by name; secret values are redacted.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/JobParameterView'
        queued_at:
          description: When the job was enqueued.
          type: string
          format: date-time
        resolved_image_digest:
          description: |-
            The concrete manifest digest actually dispatched, recorded at dispatch;
            `None` until then.
          anyOf:
          - $ref: '#/components/schemas/Digest'
          - type: 'null'
        restart_policy:
          $ref: '#/components/schemas/RestartPolicy'
        ssh_endpoints:
          description: SSH endpoints the running job is reachable on; `None` until reported.
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/SshEndpoint'
        ssh_keys:
          type: array
          items:
            type: string
        started_at:
          description: When the job was dispatched onto a host; `None` if not yet started.
          type:
          - string
          - 'null'
          format: date-time
        state:
          description: Where the job is in its lifecycle.
          allOf:
          - $ref: '#/components/schemas/JobState'
        target_requirements:
          description: |-
            Target (DUT) eligibility: one tag set per requested target, in submission
            order.
          type: array
          items:
            type: array
            items:
              type: string
        task_exit_status:
          description: |-
            The user workload's success/failure outcome, orthogonal to
            `termination_reason`; `None` if never reported.
          anyOf:
          - $ref: '#/components/schemas/TaskExitStatus'
          - type: 'null'
        terminated_at:
          description: When the job was finalized; `None` until then.
          type:
          - string
          - 'null'
          format: date-time
        termination_reason:
          description: Why the job terminated; `None` until finalized.
          anyOf:
          - $ref: '#/components/schemas/TerminationReason'
          - type: 'null'
        timeout_secs:
          description: How long the job may run before it is killed, in seconds.
          type: integer
          format: int64
      required:
      - job_id
      - state
      - image
      - ssh_keys
      - restart_policy
      - host_tag_requirements
      - target_requirements
      - parameters
      - timeout_secs
      - queued_at
      - last_updated_at
    JobInitSpec:
      oneOf:
      - description: Resume a previously started job.
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: resume_job
        required:
        - type
        - job_id
      - description: Restart a job.
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          type:
            type: string
            const: restart_job
        required:
        - type
        - job_id
      - description: |-
          Base this job off a concrete image registered in the switchboard
          catalog, addressed by its OCI manifest digest. At dispatch the
          switchboard resolves the digest to its registry locations and hands the
          supervisor a content-addressed [`ImageSpecification::Image`].

          [`ImageSpecification::Image`]:
              crate::api::switchboard_supervisor::ImageSpecification::Image
        type: object
        properties:
          image:
            $ref: '#/components/schemas/Digest'
          type:
            type: string
            const: image
        required:
        - type
        - image
      - description: |-
          Base this job off a registered image *group* (an OCI image index),
          addressed by its index digest. After a host is chosen, the switchboard
          matcher selects the group member whose required host tags the chosen
          host satisfies and dispatches that concrete member's digest.
        type: object
        properties:
          image_group:
            $ref: '#/components/schemas/Digest'
          type:
            type: string
            const: image_group
        required:
        - type
        - image_group
    JobInitializingStage:
      oneOf:
      - description: 'Generic starting stage, for when no other stage is applicable:'
        type: string
        const: starting
      - description: 'Fetching the specified image:'
        type: string
        const: fetching_image
      - description: |-
          Acquiring resources, such as the root file system, to launch the
          board environment.
        type: string
        const: allocating
      - description: |-
          Provisioning the environment, such as making any changes to the base
          system according to the user-provided customizations.
        type: string
        const: provisioning
      - description: |-
          The host is booting. The next transition is normally into
          [`RunningJobState::Ready`]; a failure instead surfaces as a
          [`SupervisorJobEvent::Error`].
        type: string
        const: booting
    JobParameterView:
      description: |-
        One job parameter as exposed by `GET /jobs/{id}`. A parameter flagged
        `secret` is **redacted**: its `value` is `None` and only the key + flag are
        visible. Non-secret parameters carry their plaintext `value`.
      type: object
      properties:
        secret:
          description: Whether this parameter was submitted as secret.
          type: boolean
        value:
          description: The plaintext value, or `None` when `secret` (withheld).
          type:
          - string
          - 'null'
      required:
      - secret
    JobRequest:
      type: object
      properties:
        host_tag_requirements:
          description: |-
            Host eligibility: the set of tags the chosen host must carry (as a
            superset) for this job to be scheduled onto it. Tags are opaque strings
            (`key=value` pairs or bare flags, by convention only), matched by
            containment against the host's tags.
          type: array
          default: []
          items:
            type: string
        init_spec:
          description: What kind of job this is.
          allOf:
          - $ref: '#/components/schemas/JobInitSpec'
        override_timeout:
          type:
          - string
          - 'null'
        owner:
          description: |-
            The subject (user or group) to own the enqueued job. Must be the caller
            itself or a group the caller is a member of; absent, ownership defaults
            to the caller. Ownership decides who can later read, stop, and manage the
            job (see `job_grants`).
          type:
          - string
          - 'null'
          format: uuid
          default: null
        parameters:
          description: |-
            A hash map of parameters provided to this job execution. These
            parameters are provided to the puppet daemon.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ParameterValue'
        restart_policy:
          $ref: '#/components/schemas/RestartPolicy'
        ssh_keys:
          description: |-
            The set of initial SSH keys to deploy onto the image.

            The image's configuration of the Treadmill puppet daemon determines
            how and whether these keys will be loaded.
          type: array
          items:
            type: string
        target_requirements:
          description: |-
            Target (DUT) eligibility: an ordered array of requested targets, each a
            set of tags an attached DUT must carry (as a superset). The scheduler
            assigns each entry to a distinct `host_targets` row on the chosen host.
            Empty requests no DUTs. Target tags do not affect image selection.
          type: array
          default: []
          items:
            type: array
            items:
              type: string
      required:
      - init_spec
      - ssh_keys
      - restart_policy
      - parameters
    JobState:
      description: |-
        The execution-lifecycle state of a job, mirroring the
        `tml_switchboard.job_state` DB enum. This is the switchboard's own view of
        where a job is in its lifecycle (queued → scheduled → executing → finalized),
        distinct from the supervisor-reported
        [`RunningJobState`](crate::api::switchboard_supervisor::RunningJobState).
      oneOf:
      - description: Enqueued, awaiting placement onto a host by the scheduler.
        type: string
        const: queued
      - description: Placed on a host but not yet reported as executing.
        type: string
        const: scheduled
      - description: |-
          The host is bringing the job up (see
          [`JobInitializingStage`](crate::api::switchboard_supervisor::JobInitializingStage)).
        type: string
        const: initializing
      - description: The job is running and ready.
        type: string
        const: ready
      - description: The job is shutting down.
        type: string
        const: terminating
      - description: 'Terminal: the job has ended (see `termination_reason`).'
        type: string
        const: finalized
    LinkedGitHub:
      description: A linked GitHub identity, reduced to the fields safe to expose publicly.
      type: object
      properties:
        login:
          description: The user's current GitHub login/handle.
          type: string
        profile_url:
          description: Canonical URL of the GitHub profile (`https://github.com/<login>`).
          type: string
      required:
      - login
      - profile_url
    LogStreamCredentials:
      description: |-
        Connection credentials for tailing/replaying a job's console logs over NATS,
        returned by `POST /jobs/{id}/log-token`.

        The token is a short-lived **bearer** user JWT scoped to *subscribe* to this
        job's log subjects (`subject`); the client connects to `nats_url` with the
        token string alone (no nkey seed). The token only needs to be valid at
        connect time — an established NATS connection is not dropped when the JWT
        expires — so a client re-requests credentials when it next reconnects, after
        roughly `expires_in_secs`.
      type: object
      properties:
        expires_in_secs:
          description: |-
            Seconds until the token's `exp`; re-request credentials after this
            elapses (only needed to open a *new* connection).
          type: integer
          format: uint64
          minimum: 0
        nats_url:
          description: NATS client URL to connect to (e.g. `nats://nats.example:4222`).
          type: string
        subject:
          description: |-
            Subject wildcard covering all of this job's log channels:
            `logs.<job-id>.>`.
          type: string
        token:
          description: Bearer user JWT authorizing subscribe on `subject`.
          type: string
      required:
      - nats_url
      - subject
      - token
      - expires_in_secs
    ParameterValue:
      type: object
      properties:
        secret:
          type: boolean
        value:
          type: string
      required:
      - value
      - secret
    PublicUserProfile:
      description: |-
        The world-readable subset of a user profile: only data deemed safe to expose
        to any authenticated caller.
      type: object
      properties:
        avatar_url:
          type:
          - string
          - 'null'
        full_name:
          type:
          - string
          - 'null'
        github:
          description: The linked GitHub account, if any.
          anyOf:
          - $ref: '#/components/schemas/LinkedGitHub'
          - type: 'null'
        user_id:
          type: string
          format: uuid
        username:
          type: string
      required:
      - user_id
      - username
    RegisterImageGroupRequest:
      description: |-
        `POST /image-groups`: register an image group by its OCI index digest. The
        switchboard pulls the index, validates each member, and records the group
        plus its (image, location, denormalized-member) rows for the matcher.
      type: object
      properties:
        index_digest:
          description: The OCI index digest identifying the group.
          allOf:
          - $ref: '#/components/schemas/Digest'
        label:
          description: Optional human-readable label.
          type:
          - string
          - 'null'
          default: null
        registry:
          description: Registry authority (`host:port`) the index can be pulled from.
          type: string
        repository:
          description: Repository path within the registry (members live in the same repo).
          type: string
      required:
      - registry
      - repository
      - index_digest
    RegisterImageRequest:
      description: |-
        `POST /images`: register a concrete image by digest. The switchboard pulls
        the manifest from `registry/repository@manifest_digest`, validates it is a
        Treadmill image, and records an `images` row plus this first location.
      type: object
      properties:
        label:
          description: Optional human-readable label.
          type:
          - string
          - 'null'
          default: null
        manifest_digest:
          description: The OCI manifest digest identifying the image.
          allOf:
          - $ref: '#/components/schemas/Digest'
        registry:
          description: Registry authority (`host:port`) the manifest can be pulled from.
          type: string
        repository:
          description: Repository path within the registry.
          type: string
      required:
      - registry
      - repository
      - manifest_digest
    RenderedAuditRow:
      description: |-
        One audit event, already rendered to a human-readable `message` for the
        requesting viewer (the switchboard resolves the per-event template and
        applies the viewer's visibility before sending it).
      type: object
      properties:
        actor_id:
          type: string
          format: uuid
        correlation_id:
          type:
          - string
          - 'null'
          format: uuid
        created_at:
          type: string
          format: date-time
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
        message:
          type: string
      required:
      - event_id
      - event_type
      - created_at
      - actor_id
      - message
    RestartPolicy:
      type: object
      properties:
        remaining_restart_count:
          type: integer
          format: uint
          minimum: 0
      required:
      - remaining_restart_count
    SelfUserProfile:
      description: |-
        The owner's full view of their own profile: the public subset plus the
        private additions only the account holder may see.
      type: object
      properties:
        avatar_url:
          type:
          - string
          - 'null'
        emails:
          description: All verified email addresses on file for the account.
          type: array
          items:
            type: string
        full_name:
          type:
          - string
          - 'null'
        github:
          description: The linked GitHub account, if any.
          anyOf:
          - $ref: '#/components/schemas/LinkedGitHub'
          - type: 'null'
        groups:
          description: Every group the user belongs to, including transitive memberships.
          type: array
          items:
            $ref: '#/components/schemas/GroupMembership'
        locked:
          description: Whether the account is locked (cannot log in or use existing sessions).
          type: boolean
        user_id:
          type: string
          format: uuid
        username:
          type: string
      required:
      - user_id
      - username
      - emails
      - groups
      - locked
    SessionInfo:
      description: |-
        One of the caller's active or historical sessions/API tokens. Never carries
        the secret token itself — only its metadata and provenance.
      type: object
      properties:
        comment:
          description: An optional human-supplied label for the token.
          type:
          - string
          - 'null'
        created_at:
          type: string
          format: date-time
        created_ip:
          description: The client IP the token was minted from, if recorded.
          type:
          - string
          - 'null'
        current:
          description: True for the token used to authenticate the current request.
          type: boolean
        expires_at:
          type: string
          format: date-time
        revoked:
          description: Set if the token has been revoked.
          anyOf:
          - $ref: '#/components/schemas/TokenRevocation'
          - type: 'null'
        token_id:
          type: string
          format: uuid
        user_agent:
          description: The user agent that requested the token, if recorded.
          type:
          - string
          - 'null'
      required:
      - token_id
      - created_at
      - expires_at
      - current
    SshEndpoint:
      description: An SSH endpoint a running job can be reached on.
      type: object
      properties:
        ssh_host:
          type: string
        ssh_port:
          type: integer
          format: uint16
          maximum: 65535
          minimum: 0
      required:
      - ssh_host
      - ssh_port
    TaskExitStatus:
      description: |-
        The supervisor's report of how the user's workload is/has turned out — its
        *task outcome*.

        The supervisor posts this at any point while it is assigned the job (see
        [`SupervisorJobEvent::DeclareExitStatus`]), independently of termination, and
        may revise it: `Pending` while the result is not yet known, then `Success` or
        `Failure`. Once set it is never cleared (it can only move between these three
        values). It is orthogonal to *why* a job terminated (see
        [`switchboard::TerminationReason`]) — a job may carry any outcome regardless
        of its termination reason, or none at all if the supervisor never reported.

        [`switchboard::TerminationReason`]: crate::api::switchboard::TerminationReason
      oneOf:
      - description: The workload is running; its result is not yet determined.
        type: string
        const: pending
      - description: The workload completed successfully.
        type: string
        const: success
      - description: The workload failed.
        type: string
        const: failure
    TerminationReason:
      description: |-
        Why a job terminated.

        This records *why* a job stopped and is orthogonal to the
        [`TaskExitStatus`] (the success/failure of the user's workload) and to any
        `exit_message`. Mirrors the `tml_switchboard.termination_reason` DB enum.
      oneOf:
      - description: The job's own workload ended it.
        type: string
        const: workload_exited
      - description: The job requested its own cancellation.
        type: string
        const: workload_self_canceled
      - description: Externally canceled by a user.
        type: string
        const: user_canceled
      - description: Timed out while still queued.
        type: string
        const: queue_timeout
      - description: Timed out while dispatched/executing.
        type: string
        const: execution_timeout
      - description: The job's image was bad or could not be fetched (user fault).
        type: string
        const: image_error
      - description: No host matched the job's tag configuration.
        type: string
        const: host_match_error
      - description: The host failed to start the job.
        type: string
        const: host_start_failure
      - description: The host's supervisor dropped the job (lost on reconnect).
        type: string
        const: host_dropped_job
      - description: The host was unreachable (its supervisor disconnected).
        type: string
        const: host_unreachable
      - description: Resuming a previously started job failed.
        type: string
        const: resume_failed
      - description: An unexpected internal failure.
        type: string
        const: internal_error
    TokenRevocation:
      description: When and why a token was revoked.
      type: object
      properties:
        reason:
          type: string
        revoked_at:
          type: string
          format: date-time
      required:
      - revoked_at
      - reason
    UpdateProfileRequest:
      description: |-
        A patch to the caller's own profile. Each field uses a double `Option` so an
        absent field (leave unchanged) is distinguishable from an explicit `null`
        (clear the value). `username` is non-nullable, so a single `Option` suffices.
      type: object
      properties:
        avatar_url:
          type:
          - string
          - 'null'
        full_name:
          type:
          - string
          - 'null'
        username:
          type:
          - string
          - 'null'
