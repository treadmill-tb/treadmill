openapi: 3.1.0
info:
  title: Treadmill Switchboard API
  version: 0.1.0
paths:
  /auth/{provider}/login:
    get:
      tags:
      - Authentication
      summary: Start an OAuth login
      description: |
        Begin an authorization-code flow with the given provider.

        This endpoint emits a 303 "See Other" redirect to the authentication
        provider's consent screen. A client may pass `?return_to=<URL>` (validated
        against a server-side allowlist) to have the callback redirect the browser
        following a successful token-exchange with the authenthenication provider.
        On redirect, the `(staged_id, staged_secret)` pair will be placed in request
        parameters of the `return_to` URL; without it the callback responds with
        JSON.
      operationId: startLogin
      parameters:
      - in: path
        name: provider
        description: The login provider's name (e.g. `github`).
        required: true
        schema:
          description: The login provider's name (e.g. `github`).
          type: string
        style: simple
      responses:
        '302':
          description: A redirect to the authentication provider's consent screen.
        '400':
          description: The declared return_to is not allowlisted.
        '404':
          description: No such provider is configured/enabled.
  /auth/{provider}/callback:
    get:
      tags:
      - Authentication
      summary: 'OAuth callback: finish a login'
      description: |
        The authentication provider's redirect target; not called directly.

        Performs a token-exchange with the authentication provider, and stages a new
        login. This endpoint does not mint a token directly; instead a client must
        complete the login with an additional request to `/auth/login/complete` by
        supplying the returned `(staged_id, staged_secret)` tuple. This tuple is
        either returned as JSON or, for a flow that declared a `return_to`
        parameter, via a 302 "See Other" redirect to an URL with those added as
        query parameters.

        A login may require additional information by the user (such as an explicit
        ToS accept). See the `/auth/login/complete` endpoint docs.
      operationId: finishLogin
      parameters:
      - in: path
        name: provider
        description: The login provider's name (e.g. `github`).
        required: true
        schema:
          description: The login provider's name (e.g. `github`).
          type: string
        style: simple
      - in: query
        name: code
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: state
        required: true
        schema:
          type: string
        style: form
      responses:
        '200':
          description: The login is staged; complete it at POST /auth/login/complete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginStagedResponse'
        '302':
          description: The login is staged; redirect to the original `redirect_to` target.
        '403':
          description: The identity was denied admission, or the account is locked.
  /auth/providers:
    get:
      tags:
      - Authentication
      summary: List the enabled login methods
      operationId: listAuthProviders
      responses:
        '200':
          description: |-
            Response body for the unauthenticated `/auth/providers` endpoint: which login
            methods a switchboard offers, so a frontend can render the right buttons
            without hardcoding provider knowledge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProvidersResponse'
  /auth/whoami:
    get:
      tags:
      - Authentication
      summary: Get the identity behind the presented token
      operationId: whoAmI
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: 'Response body for `/auth/whoami`: the identity of the authenticated subject.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoAmIResponse'
      security:
      - token: []
  /auth/tos:
    get:
      tags:
      - Authentication
      summary: Get the current Terms of Service
      operationId: getTermsOfService
      responses:
        '200':
          description: |-
            Response body for `GET /auth/tos`: the Terms of Service text a frontend
            renders on the login-completion page, plus the version it corresponds to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TosInfoResponse'
  /auth/login/complete:
    post:
      tags:
      - Authentication
      summary: Complete a staged login
      description: |
        Claim a staged login by providing the `(staged_id, staged_secret)` tuple
        provided by the callback response or redirect.

        Completing the login may require supplying additional values. If `required`
        includes `"tos"`, the `"tos_version"` field must be the current ToS
        version.

        Accepts the same fields form-encoded (for no-JS browser frontends).
      operationId: completeLogin
      requestBody:
        description: |-
          Request body for `POST /auth/login/complete`: finish a staged login. Sent as
          JSON or form-encoded data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCompleteRequest'
        required: true
      responses:
        '200':
          description: The login completed; the response carries the session token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          description: The account is locked.
        '409':
          description: A required step is missing, or the echoed tos_version is not the one in force; the presented pair was consumed and the marker carries a fresh one to retry with.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginStagedResponse'
        '410':
          description: Unknown staged id, wrong secret, or the staged login expired or was already used.
  /jobs:
    get:
      tags:
      - Jobs
      summary: List jobs
      operationId: listJobs
      parameters:
      - in: query
        name: cursor
        description: Opaque keyset cursor from a previous response's `next_cursor`.
        schema:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type: string
        style: form
      - in: query
        name: limit
        description: |-
          Maximum number of jobs per page. Omitted or out-of-range values fall
          back to the server's default and bounds.
        schema:
          description: |-
            Maximum number of jobs per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type: integer
          format: uint32
          minimum: 0
        style: form
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            Response body of `GET /jobs`: a page of jobs the caller can read, newest
            first.

            Pagination is **keyset** on `(queued_at, job_id)` descending: when
            `next_cursor` is non-null, pass it back as the `cursor` query parameter to
            fetch the next page; a null `next_cursor` means the last page. There is no
            total count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
      security:
      - token: []
    post:
      tags:
      - Jobs
      summary: Enqueue a job
      operationId: enqueueJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
        '201':
          description: The job was enqueued; the response carries its id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnqueueJobResponse'
      security:
      - token: []
  /jobs/{id}/events:
    get:
      tags:
      - Jobs
      summary: List a job's audit events
      operationId: listJobEvents
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      - in: query
        name: cursor
        description: Opaque keyset cursor from a previous response's `next_cursor`.
        schema:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type: string
        style: form
      - in: query
        name: limit
        description: |-
          Maximum number of events per page. Omitted or out-of-range values fall
          back to the server's default and bounds.
        schema:
          description: |-
            Maximum number of events per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type: integer
          format: uint32
          minimum: 0
        style: form
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            A page of rendered audit events for one entity, newest first.

            Paginated by keyset: when `next_cursor` is non-null, pass it back as the
            `cursor` query parameter to fetch the next (older) page; a null `next_cursor`
            means the last page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
      security:
      - token: []
  /jobs/{id}/nats-log-token:
    post:
      tags:
      - Jobs
      summary: Create a NATS log-streaming token for a job
      operationId: createJobNatsLogToken
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            Connection credentials for tailing/replaying a job's console logs over NATS,
            returned by `POST /jobs/{id}/nats-log-token`.

            The token is a short-lived **bearer** user JWT scoped to this job only: it
            may *subscribe* to the job's log subjects (`subject`) and its own inboxes
            (`inbox_prefix`), and *publish* to the slice of the JetStream API needed to
            run an ordered consumer against the job's stream (`stream`) — enough to
            replay stored history and then follow live. The client connects with the
            token string alone (no nkey seed) to whichever endpoint suits its transport:
            `websocket_url` for browsers, `nats_url` for native TCP clients. The same
            token authorizes either. The token only needs to be valid at connect time —
            an established NATS connection is not dropped when the JWT expires — so a
            client re-requests credentials when it next reconnects, after roughly
            `expires_in_secs`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NatsLogStreamCredentials'
        '503':
          description: Log streaming is not enabled on this deployment.
      security:
      - token: []
  /jobs/{id}:
    get:
      tags:
      - Jobs
      summary: Get a job
      operationId: getJob
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The full server-side view of a single job, returned by `GET /jobs/{id}`.

            Covers the job's identity, ownership, lifecycle state, the spec it was
            enqueued with, and — once it has run — its placement and terminal outcome.
            Secret parameters are redacted (see [`JobParameterView`]).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobInfo'
      security:
      - token: []
    delete:
      tags:
      - Jobs
      summary: Terminate a job
      operationId: terminateJob
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '202':
          description: Termination was initiated.
        '204':
          description: The job was already finalized; nothing to do.
      security:
      - token: []
  /hosts:
    get:
      tags:
      - Hosts
      summary: List hosts
      description: Returns the complete set in a stable order; this route is not paginated.
      operationId: listHosts
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HostInfo'
      security:
      - token: []
  /hosts/{id}/events:
    get:
      tags:
      - Hosts
      summary: List a host's audit events
      operationId: listHostEvents
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      - in: query
        name: cursor
        description: Opaque keyset cursor from a previous response's `next_cursor`.
        schema:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type: string
        style: form
      - in: query
        name: limit
        description: |-
          Maximum number of events per page. Omitted or out-of-range values fall
          back to the server's default and bounds.
        schema:
          description: |-
            Maximum number of events per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type: integer
          format: uint32
          minimum: 0
        style: form
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            A page of rendered audit events for one entity, newest first.

            Paginated by keyset: when `next_cursor` is non-null, pass it back as the
            `cursor` query parameter to fetch the next (older) page; a null `next_cursor`
            means the last page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
      security:
      - token: []
  /hosts/{id}/connect:
    get:
      tags:
      - Hosts
      summary: Open a host's supervisor WebSocket
      operationId: connectHost
      parameters:
      - in: header
        name: authorization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '101':
          description: websocket upgrade
          headers:
            connection:
              style: simple
              schema:
                const: upgrade
                enum:
                - upgrade
                type: string
                example: upgrade
            upgrade:
              style: simple
              schema:
                const: websocket
                enum:
                - websocket
                type: string
                example: websocket
            sec-websocket-key:
              style: simple
              schema:
                type: string
            sec-websocket-protocol:
              style: simple
              schema:
                type: string
  /users/me:
    get:
      tags:
      - Users
      summary: Get the current user's profile
      operationId: getCurrentUser
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The owner's full view of their own profile: the public subset plus the
            private additions only the account holder may see.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfUserProfile'
      security:
      - token: []
    patch:
      tags:
      - Users
      summary: Update the current user's profile
      operationId: updateCurrentUser
      requestBody:
        description: |-
          A patch to the caller's own profile. Omitting a field leaves it unchanged;
          sending an explicit `null` clears it. `username` cannot be cleared, only
          changed.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The owner's full view of their own profile: the public subset plus the
            private additions only the account holder may see.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfUserProfile'
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: The requested username is already taken.
      security:
      - token: []
  /users/me/tokens:
    get:
      tags:
      - Users
      summary: List the current user's tokens
      description: Returns the complete set in a stable order; this route is not paginated.
      operationId: listCurrentUserTokens
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
      security:
      - token: []
  /users/me/tokens/{token_id}:
    delete:
      tags:
      - Users
      summary: Revoke one of the current user's tokens
      operationId: revokeCurrentUserToken
      parameters:
      - in: path
        name: token_id
        description: The token's unique identifier.
        required: true
        schema:
          description: The token's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '204':
          description: The token was revoked.
        '404':
          description: No such token belonging to the caller.
      security:
      - token: []
  /users/{id}:
    get:
      tags:
      - Users
      summary: Get a user's public profile
      operationId: getUser
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            The world-readable subset of a user profile: only data deemed safe to expose
            to any authenticated caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfile'
        '404':
          description: No such user.
      security:
      - token: []
  /users/{id}/events:
    get:
      tags:
      - Users
      summary: List a user's audit events
      operationId: listUserEvents
      parameters:
      - in: path
        name: id
        description: The resource's unique identifier.
        required: true
        schema:
          description: The resource's unique identifier.
          type: string
          format: uuid
        style: simple
      - in: query
        name: cursor
        description: Opaque keyset cursor from a previous response's `next_cursor`.
        schema:
          description: Opaque keyset cursor from a previous response's `next_cursor`.
          type: string
        style: form
      - in: query
        name: limit
        description: |-
          Maximum number of events per page. Omitted or out-of-range values fall
          back to the server's default and bounds.
        schema:
          description: |-
            Maximum number of events per page. Omitted or out-of-range values fall
            back to the server's default and bounds.
          type: integer
          format: uint32
          minimum: 0
        style: form
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: |-
            A page of rendered audit events for one entity, newest first.

            Paginated by keyset: when `next_cursor` is non-null, pass it back as the
            `cursor` query parameter to fetch the next (older) page; a null `next_cursor`
            means the last page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedResponse'
      security:
      - token: []
  /images:
    get:
      tags:
      - Images
      summary: List images
      description: Returns the complete set in a stable order; this route is not paginated.
      operationId: listImages
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageInfo'
      security:
      - token: []
    post:
      tags:
      - Images
      summary: Register an image
      operationId: registerImage
      requestBody:
        description: |-
          `POST /images`: register a concrete image by digest. The switchboard pulls
          the manifest from `registry/repository@manifest_digest`, validates it is a
          Treadmill image, and records the image plus its first location.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterImageRequest'
        required: true
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '400':
          description: Failed to parse the request body as JSON
          content:
            text/plain:
              schema:
                type: string
        '415':
          description: 'Expected request with `Content-Type: application/json`'
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Failed to deserialize the JSON body into the target type
          content:
            text/plain:
              schema:
                type: string
        '201':
          description: The image was newly registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageInfo'
        '200':
          description: The image was already registered; this location was added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageInfo'
        '409':
          description: This digest is already registered to another owner.
        '502':
          description: The image's registry could not be reached or returned an error.
      security:
      - token: []
  /images/{digest}:
    get:
      tags:
      - Images
      summary: Get an image
      operationId: getImage
      parameters:
      - in: path
        name: digest
        description: The image's OCI manifest digest (`sha256:<hex>`).
        required: true
        schema:
          description: The image's OCI manifest digest (`sha256:<hex>`).
          type: string
        style: simple
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: A registered image, as returned by the catalog list/inspect routes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageInfo'
        '404':
          description: No such image, or it is not visible to the caller.
      security:
      - token: []
  /image-groups:
    get:
      tags:
      - Image groups
      summary: List image groups
      description: Returns the complete set in a stable order; this route is not paginated.
      operationId: listImageGroups
      responses:
        '401':
          description: 'Authentication failed: the bearer token is missing, malformed, expired, or revoked.'
        '403':
          description: The authenticated account is locked, or lacks permission for this resource.
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageGroupInfo'
      security:
      - token: []
    post:
      tags:
      - Image groups
      summary: Create an image group
      operationId: createImageGroup
      requestBody:
        description: |-
          `POST /image-groups`: create an empty, named image group. The caller becomes
